name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: python -m pip install --upgrade pip flake8
      - name: flake8 (critical bug codes only — see setup.cfg)
        run: flake8 app/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # PySide6/Qt GUI + pytest-qt need a display and Qt system libs on Linux.
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 libnss3 \
            libasound2t64 libpulse0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # The whole suite in one process segfaults in Qt teardown when the
      # QtMultimedia voice-note tests run after the rest (cross-test Qt state).
      # Both halves pass in isolation, so run them as two steps.
      - name: pytest (all except voice-notes)
        run: xvfb-run -a python -m pytest tests/ --ignore=tests/test_whatsapp_voice_notes.py -q
      - name: pytest (voice-notes, isolated)
        run: xvfb-run -a python -m pytest tests/test_whatsapp_voice_notes.py -q
