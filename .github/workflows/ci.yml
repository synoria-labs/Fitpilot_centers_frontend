name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: python -m pip install --upgrade pip flake8
      - name: flake8 (critical bug codes only — see setup.cfg)
        run: flake8 app/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # PySide6/Qt GUI + pytest-qt need a display and Qt system libs on Linux.
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 libnss3 \
            libasound2t64 libpulse0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # test_whatsapp_voice_notes.py exercises real QtMultimedia audio hardware
      # (QAudioSource/QMediaDevices), which aborts on a headless Linux runner with
      # no audio device. Those tests run locally on Windows (real mic); CI runs the
      # 58 portable tests. (They also can't share a process with the rest — a Qt
      # teardown segfault — so keeping them out of CI is doubly correct.)
      - name: pytest (portable suite, excl. QtMultimedia audio tests)
        run: xvfb-run -a python -m pytest tests/ --ignore=tests/test_whatsapp_voice_notes.py -q
