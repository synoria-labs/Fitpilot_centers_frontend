[flake8]
# Baseline de CI para un código legacy: se enfuerzan solo los códigos que
# señalan BUGS reales (errores de sintaxis, nombres indefinidos, f-strings
# rotos), no el estilo. Verificado en verde sobre app/ + tests/. El estilo
# (E/W, imports sin usar F401) queda como deuda a apretar más adelante — p. ej.
# migrando a `black` con un reformat de una sola vez.
select = E9,F63,F7,F82
max-line-length = 120
exclude =
    .venv,
    .git,
    __pycache__,
    build,
    dist,
    cache,
    logs,
    data,
    tools
